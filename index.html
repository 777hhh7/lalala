<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>飞机大战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; touch-action: none; position: fixed; inset: 0; }
#game-wrapper { position: relative; width: min(480px, 100vw); height: min(700px, 100vh, 100dvh); }
canvas { width: 100%; height: 100%; border: 2px solid #2a3a5a; border-radius: 8px; box-shadow: 0 0 60px rgba(0,100,255,0.15); display: block; touch-action: none; }
#hud { position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; color: #fff; font-size: clamp(11px, 3vw, 14px); font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(0,150,255,0.3); pointer-events: none; z-index: 2; }
.hud-item { background: rgba(0,0,0,0.6); padding: 3px 10px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
.hud-item .label { color: #8899bb; font-size: clamp(9px, 2.5vw, 12px); }
.hud-item .value { color: #ffd200; font-weight: bold; }
.overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; justify-content: center; align-items: center; background: rgba(10,10,26,0.88); border-radius: 8px; z-index: 10; }
.overlay.active { display: flex; }
.panel { pointer-events: auto; text-align: center; color: #fff; width: 85%; max-width: 340px; max-height: 90vh; overflow-y: auto; }
.panel h1 { font-size: clamp(32px, 9vw, 44px); margin-bottom: 4px; }
.panel h1.gold { background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.panel p { color: #8899bb; font-size: clamp(13px, 3.5vw, 15px); margin-bottom: 16px; }
.name-input { background: rgba(255,255,255,0.08); border: 2px solid #3a4a6a; border-radius: 8px; padding: 12px 16px; font-size: clamp(16px, 4vw, 18px); color: #fff; outline: none; width: 80%; max-width: 220px; text-align: center; margin-bottom: 14px; }
.name-input:focus { border-color: #667eea; } .name-input::placeholder { color: #556; }
.btn { pointer-events: auto; padding: 14px 40px; font-size: clamp(16px, 4vw, 18px); border: none; border-radius: 50px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; cursor: pointer; transition: transform 0.1s; font-weight: 600; min-width: 140px; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.95); }
.btn-sm { padding: 10px 24px; font-size: clamp(13px, 3vw, 14px); background: linear-gradient(135deg, #555, #777); min-width: auto; }
.btn-green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.final-score { font-size: clamp(22px, 6vw, 26px); color: #ffd200; margin-bottom: 4px; }
.rank-info { font-size: clamp(14px, 3.5vw, 15px); color: #4fc3f7; margin-bottom: 2px; }
.high-score { font-size: clamp(13px, 3vw, 14px); color: #8899bb; margin-bottom: 14px; }
.lb-title { font-size: clamp(22px, 6vw, 28px); color: #fff; margin-bottom: 10px; }
.lb-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; font-size: clamp(12px, 3vw, 14px); }
.lb-table th { color: #8899bb; font-size: clamp(10px, 2.5vw, 12px); padding: 3px 6px; border-bottom: 1px solid #2a3a5a; }
.lb-table td { padding: 4px 6px; border-bottom: 1px solid #1a2a3a; }
.lb-table .rank { color: #667; width: 26px; }
.lb-table .name { color: #fff; text-align: left; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-table .sc { color: #ffd200; font-weight: bold; }
.lb-table .lv { color: #4fc3f7; font-size: clamp(10px, 2.5vw, 12px); }
.lb-table .me td { background: rgba(102,126,234,0.15); }
.lb-medal { font-size: 14px; }
.lb-empty { color: #556; font-size: 14px; margin: 20px 0; }
.lb-loading { color: #667; font-size: 14px; margin: 20px 0; }
.lb-footer { font-size: 11px; color: #445; margin-top: 6px; }
#touch-hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: clamp(11px, 2.8vw, 13px); pointer-events: none; z-index: 1; text-align: center; }
</style>
</head>
<body>
<div id="game-wrapper">
<canvas id="game"></canvas>
<div id="hud"><div class="hud-item"><span class="label">得分</span><span id="score" class="value">0</span></div><div class="hud-item"><span class="label">血量</span><span id="hp-display" class="value">3/3</span></div><div class="hud-item"><span class="label">波次</span><span id="level" class="value">1</span></div></div>
<div id="touch-hint">触摸拖动飞机 | 自动射击</div>

<div class="overlay active" id="start-screen">
<div class="panel">
<h1 class="gold">飞机大战</h1>
<p>手指拖动 | 自动射击</p>
<input class="name-input" id="name-input" placeholder="输入名字" maxlength="8" value="玩家">
<div><button class="btn" id="start-btn">开始游戏</button></div>
<div class="btn-row"><button class="btn btn-sm" id="lb-btn">&#127942; 排行榜</button></div>
</div></div>

<div class="overlay" id="game-over-screen">
<div class="panel">
<h1 style="color:#ff4757">游戏结束</h1>
<div class="final-score">得分: <span id="final-score">0</span></div>
<div id="rank-info" class="rank-info"></div>
<div class="high-score">个人最高: <span id="high-score">0</span></div>
<div class="btn-row">
<button class="btn" id="restart-btn">再来一次</button>
<button class="btn btn-sm" id="lb-btn2">排行榜</button>
</div>
<div style="margin-top:10px"><button class="btn btn-sm btn-green" id="share-btn">&#128279; 提交到全球排行榜</button></div>
</div></div>

<div class="overlay" id="lb-screen">
<div class="panel">
<div class="lb-title">&#127942; 全球排行榜</div>
<div id="lb-body"><div class="lb-loading">加载中...</div></div>
<div class="btn-row">
<button class="btn btn-sm" id="lb-back">返回</button>
<button class="btn btn-sm" id="lb-refresh">刷新</button>
</div>
</div></div>
</div>

<script>
// ===== DOM =====
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var W = 480, H = 700;
canvas.width = W; canvas.height = H;

var scoreEl = document.getElementById('score');
var hpEl = document.getElementById('hp-display');
var levelEl = document.getElementById('level');
var finalScoreEl = document.getElementById('final-score');
var rankInfoEl = document.getElementById('rank-info');
var highScoreEl = document.getElementById('high-score');
var startScr = document.getElementById('start-screen');
var gameOverScr = document.getElementById('game-over-screen');
var lbScr = document.getElementById('lb-screen');
var lbBody = document.getElementById('lb-body');
var nameInput = document.getElementById('name-input');
var touchHint = document.getElementById('touch-hint');
var startBtn = document.getElementById('start-btn');
var restartBtn = document.getElementById('restart-btn');
var shareBtn = document.getElementById('share-btn');

var playerName = '玩家';
var lastScore = 0, lastLevel = 1;

// === 排行榜 ===
var RAW_URL = 'https://raw.githubusercontent.com/777hhh7/lalala/main/data/scores.json';
var ISSUE_URL = 'https://github.com/777hhh7/lalala/issues/new';

function fetchLB() {
  return fetch(RAW_URL + '?t=' + Date.now(), { signal: AbortSignal.timeout(5000) })
    .then(function(r){ if(!r.ok) throw Error(); return r.json(); })
    .catch(function(){ return null; });
}

function esc(s) { return String(s).replace(/[&<>]/g, ''); }

function renderLB() {
  lbBody.innerHTML = '<div class="lb-loading">加载中...</div>';
  fetchLB().then(function(data){
    if (!data || !data.length) {
      lbBody.innerHTML = '<div class="lb-empty">暂无全球排行榜<br><span style="font-size:12px;color:#556">提交后需等待几分钟刷新</span></div>';
      return;
    }
    var medals = ['<span class="lb-medal">&#129351;</span>','<span class="lb-medal">&#129352;</span>','<span class="lb-medal">&#129353;</span>'];
    var h = '<table class="lb-table"><tr><th>#</th><th>玩家</th><th>得分</th><th>波次</th></tr>';
    data.slice(0, 50).forEach(function(r,i){
      var rank = i < 3 ? medals[i] : '<span class="rank">'+(i+1)+'</span>';
      var me = r.name === playerName;
      h += '<tr'+(me?' class="me"':'')+'><td>'+rank+'</td><td class="name">'+esc(r.name)+'</td><td class="sc">'+r.score+'</td><td class="lv">'+r.level+'</td></tr>';
    });
    h += '</table><div class="lb-footer">所有玩家共享 | GitHub Action 自动处理</div>';
    lbBody.innerHTML = h;
  });
}

// === 游戏 ===
var G = {
  run:0, over:0, score:0, level:1,
  hi: parseInt(localStorage.getItem('pw_h')) || 0,
  enemies:[], bullets:[], particles:[], stars:[],
  spawnTimer:0, spawnInterval:60, maxEnemies:8,
  combo:0, comboTimer:0, keys:{}
};

var P = {
  x:W/2, y:H-80, w:40, h:44, speed:5,
  shootCD:0, shootDelay:10, inv:0, hp:3, maxHp:3
};

for(var i=0; i<100; i++) {
  G.stars.push({ x:Math.random()*W, y:Math.random()*H, size:Math.random()*2+0.5, speed:Math.random()*1.5+0.3, bright:Math.random()*0.5+0.5 });
}

// === 输入 ===
var touchActive = false, targetX = P.x;
function moveTo(cx, cy) {
  var r = canvas.getBoundingClientRect();
  targetX = Math.max(P.w/2, Math.min(W - P.w/2, (cx - r.left) * (W / r.width)));
}
canvas.addEventListener('mousemove', function(e){ if(G.run && !G.over) moveTo(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e){
  e.preventDefault(); touchActive = true;
  touchHint.style.opacity = '0'; touchHint.style.transition = 'opacity 0.5s';
  moveTo(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchmove', function(e){
  e.preventDefault(); if(G.run && !G.over) moveTo(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
canvas.addEventListener('touchend', function(e){ e.preventDefault(); touchActive = false; }, {passive:false});
canvas.addEventListener('touchcancel', function(e){ e.preventDefault(); touchActive = false; }, {passive:false});
document.addEventListener('keydown', function(e){ G.keys[e.key]=1; if(e.key===' '||e.key==='z'||e.key==='Z')e.preventDefault(); });
document.addEventListener('keyup', function(e){ G.keys[e.key]=0; });

// === 绘图 ===
function drawPlayer() {
  if(P.inv>0 && Math.floor(P.inv/4)%2===0) return;
  ctx.save(); ctx.translate(P.x, P.y);
  var g=ctx.createLinearGradient(0,-P.h/2,0,P.h/2);
  g.addColorStop(0,'#4fc3f7');g.addColorStop(0.5,'#2196f3');g.addColorStop(1,'#1565c0');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(0,-P.h/2);ctx.lineTo(-P.w/2+5,P.h/4);ctx.lineTo(-P.w/3,P.h/2);ctx.lineTo(0,P.h/3);ctx.lineTo(P.w/3,P.h/2);ctx.lineTo(P.w/2-5,P.h/4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#81d4fa';ctx.beginPath();ctx.ellipse(0,-P.h/6,P.w/6,P.h/6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1976d2';ctx.beginPath();ctx.moveTo(-P.w/3,P.h/6);ctx.lineTo(-P.w/2-8,P.h/3+6);ctx.lineTo(-P.w/3,P.h/3);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(P.w/3,P.h/6);ctx.lineTo(P.w/2+8,P.h/3+6);ctx.lineTo(P.w/3,P.h/3);ctx.closePath();ctx.fill();
  var gl=ctx.createRadialGradient(0,P.h/2,2,0,P.h/2,12);gl.addColorStop(0,'rgba(255,200,50,0.8)');gl.addColorStop(1,'rgba(255,100,0,0)');ctx.fillStyle=gl;ctx.fillRect(-8,P.h/2-4,16,16);
  var bw=36,bh=4,by=-P.h/2-12;ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(-bw/2,by,bw,bh);
  var hr=P.hp/P.maxHp,hc=hr>0.5?'#4caf50':hr>0.25?'#ffd200':'#ff4757';ctx.fillStyle=hc;ctx.shadowColor=hc;ctx.shadowBlur=6;ctx.fillRect(-bw/2,by,bw*hr,bh);ctx.shadowBlur=0;
  ctx.restore();
}
function drawEnemy(e) {
  ctx.save();ctx.translate(e.x,e.y);
  var g=ctx.createLinearGradient(0,-e.h/2,0,e.h/2);g.addColorStop(0,'#ff6b6b');g.addColorStop(1,'#c0392b');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(e.w/2,0);ctx.lineTo(e.w/3,e.h/2);ctx.lineTo(0,e.h/2+4);ctx.lineTo(-e.w/3,e.h/2);ctx.lineTo(-e.w/2,0);ctx.lineTo(-e.w/3,-e.h/3);ctx.lineTo(0,-e.h/2);ctx.lineTo(e.w/3,-e.h/3);ctx.closePath();ctx.fill();
  ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.ellipse(0,-e.h/8,e.w/7,e.h/7,0,0,Math.PI*2);ctx.fill();
  var g2=ctx.createRadialGradient(0,e.h/2,1,0,e.h/2,8);g2.addColorStop(0,'rgba(255,100,50,0.6)');g2.addColorStop(1,'rgba(255,50,0,0)');ctx.fillStyle=g2;ctx.fillRect(-6,e.h/2-2,12,10);
  if(e.hp>1){ctx.fillStyle='#333';ctx.fillRect(-e.w/2,-e.h/2-8,e.w,4);ctx.fillStyle=e.hp===3?'#ffd200':'#4fc3f7';ctx.fillRect(-e.w/2,-e.h/2-8,e.w*(e.hp/e.maxHp),4);}
  ctx.restore();
}
function drawBullet(b) {
  ctx.save();ctx.translate(b.x,b.y);
  if(b.enemy){ctx.fillStyle='#ff6b6b';ctx.shadowColor='#ff6b6b';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();}
  else{var g=ctx.createLinearGradient(0,-6,0,6);g.addColorStop(0,'#fff');g.addColorStop(0.5,'#4fc3f7');g.addColorStop(1,'#2196f3');ctx.fillStyle=g;ctx.shadowColor='#4fc3f7';ctx.shadowBlur=12;ctx.fillRect(-2,-6,4,12);}
  ctx.restore();
}
function spawnParticles(x,y,color,count,speed){
  count=count||12;speed=speed||4;
  for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*speed+1;G.particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.03+0.015,size:Math.random()*4+2,color:color});}
}
function drawParticles(){
  for(var i=G.particles.length-1;i>=0;i--){var p=G.particles[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

function spawnEnemy() {
  var types=[{w:32,h:36,hp:1,speed:1.5,score:10},{w:40,h:44,hp:2,speed:1,score:25}];
  var toughChance=Math.min(G.level*0.15,0.6);
  var type=Math.random()<toughChance?types[1]:types[0];
  G.enemies.push({x:20+Math.random()*(W-40),y:-40,w:type.w,h:type.h,hp:type.hp,maxHp:type.hp,speed:type.speed+Math.random()*0.3,score:type.score,shootTimer:60+Math.random()*120});
}

function shoot() {
  if(P.shootCD>0) return;
  G.bullets.push({x:P.x-8,y:P.y-P.h/2,enemy:false});
  G.bullets.push({x:P.x+8,y:P.y-P.h/2,enemy:false});
  P.shootCD=P.shootDelay;
}
function enemyShoot(e){G.bullets.push({x:e.x,y:e.y+e.h/2,enemy:true});}
function rectCollide(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2;}

function update() {
  if(!G.run||G.over)return;
  if(G.keys['ArrowLeft']||G.keys['a'])P.x-=P.speed;
  else if(G.keys['ArrowRight']||G.keys['d'])P.x+=P.speed;
  else if(touchActive){var d=targetX-P.x;if(Math.abs(d)>2)P.x+=Math.sign(d)*Math.min(Math.abs(d)*0.15,P.speed*1.2);else P.x=targetX;}
  P.x=Math.max(P.w/2,Math.min(W-P.w/2,P.x));
  if(P.inv>0)P.inv--;if(P.shootCD>0)P.shootCD--;
  shoot();
  if(G.comboTimer>0)G.comboTimer--;else G.combo=0;

  G.spawnTimer++;
  var interval=Math.max(20,G.spawnInterval-G.level*3);
  var maxEn=Math.min(20,G.maxEnemies+G.level);
  if(G.spawnTimer>=interval&&G.enemies.length<maxEn){spawnEnemy();G.spawnTimer=0;if(G.level>=3&&Math.random()<0.3)spawnEnemy();}

  for(var i=G.enemies.length-1;i>=0;i--){var e=G.enemies[i];e.y+=e.speed;e.x+=Math.sin(e.y*0.02)*0.8;e.shootTimer--;if(e.shootTimer<=0){enemyShoot(e);e.shootTimer=80+Math.random()*100;}if(e.y>H+40)G.enemies.splice(i,1);}
  for(i=G.bullets.length-1;i>=0;i--){var b=G.bullets[i];b.y+=b.enemy?4:-7;if(b.y<-20||b.y>H+20){G.bullets.splice(i,1);continue;}}

  for(i=G.bullets.length-1;i>=0;i--){b=G.bullets[i];if(b.enemy)continue;var hit=false;
    for(var j=G.enemies.length-1;j>=0;j--){e=G.enemies[j];if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){e.hp--;hit=true;
      if(e.hp<=0){spawnParticles(e.x,e.y,'#ff6b6b',15);spawnParticles(e.x,e.y,'#ffd200',8,3);G.score+=e.score*(1+G.combo*0.1);G.combo++;G.comboTimer=120;G.enemies.splice(j,1);}
      else spawnParticles(e.x,e.y,'#fff',4,2);break;}}if(hit)G.bullets.splice(i,1);}

  for(i=G.enemies.length-1;i>=0;i--){e=G.enemies[i];if(rectCollide(P,e)&&P.inv===0){P.hp--;spawnParticles(P.x,P.y,'#4fc3f7',25,5);P.inv=80;G.enemies.splice(i,1);G.combo=0;if(P.hp<=0){gameOver();return;}}}
  for(i=G.bullets.length-1;i>=0;i--){b=G.bullets[i];if(!b.enemy)continue;if(Math.abs(b.x-P.x)<P.w/2&&Math.abs(b.y-P.y)<P.h/2&&P.inv===0){P.hp--;spawnParticles(P.x,P.y,'#4fc3f7',20,4);P.inv=80;G.bullets.splice(i,1);G.combo=0;if(P.hp<=0){gameOver();return;}}}

  var nl=Math.floor(G.score/100)+1;if(nl>G.level){G.level=nl;spawnParticles(W/2,H/2,'#ffd200',30,6);}
  for(i=G.particles.length-1;i>=0;i--){var p=G.particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.98;p.vy*=0.98;if(p.life<=0)G.particles.splice(i,1);}

  scoreEl.textContent=Math.round(G.score);hpEl.textContent=P.hp+'/'+P.maxHp;levelEl.textContent=G.level;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  for(var i=0;i<G.stars.length;i++){var s=G.stars[i];s.y+=s.speed*0.5;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.fillStyle='rgba(255,255,255,'+s.bright+')';ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();}
  if(G.combo>=3){ctx.save();ctx.font='bold 18px "Courier New"';ctx.textAlign='center';ctx.fillStyle='#ffd200';ctx.shadowColor='#ffd200';ctx.shadowBlur=10;ctx.fillText(G.combo+'x 连击!',W/2,50);ctx.restore();}
  for(i=0;i<G.bullets.length;i++)drawBullet(G.bullets[i]);
  for(i=0;i<G.enemies.length;i++)drawEnemy(G.enemies[i]);
  drawPlayer();drawParticles();
}

function gameOver() {
  G.over=1;G.run=0;
  lastScore=Math.round(G.score);lastLevel=G.level;
  if(lastScore>G.hi){G.hi=lastScore;localStorage.setItem('pw_h',G.hi);}
  finalScoreEl.textContent=lastScore;highScoreEl.textContent=G.hi;
  fetchLB().then(function(d){if(d&&d.length){var r=d.findIndex(function(x){return lastScore>=x.score});rankInfoEl.textContent=r>=0?'可进全球前 '+(r+1)+' 名！':'再接再厉！';}});
  gameOverScr.classList.add('active');
}

function reset() {
  G.run=1;G.over=0;G.score=0;G.level=1;G.enemies=[];G.bullets=[];G.particles=[];G.combo=0;G.comboTimer=0;G.spawnTimer=0;
  P.x=W/2;P.y=H-80;P.inv=40;P.shootCD=0;P.hp=3;targetX=P.x;
  scoreEl.textContent='0';hpEl.textContent='3/3';levelEl.textContent='1';
}

function loop(){update();draw();requestAnimationFrame(loop);}

function showOnly(s){
  startScr.classList.remove('active');gameOverScr.classList.remove('active');lbScr.classList.remove('active');
  if(s)s.classList.add('active');
}

// === 事件绑定 ===
shareBtn.addEventListener('click',function(){
  var t=encodeURIComponent('SCORE:'+lastScore+' LEVEL:'+lastLevel);
  var b=encodeURIComponent(playerName+'\n\n自动提交: 飞机大战得分');
  window.open(ISSUE_URL+'?title='+t+'&body='+b+'&labels=score','_blank');
});
startBtn.addEventListener('click',function(){playerName=nameInput.value.trim()||'玩家';showOnly(null);reset();});
restartBtn.addEventListener('click',function(){showOnly(null);reset();});
document.getElementById('lb-btn').addEventListener('click',function(){showOnly(lbScr);renderLB();});
document.getElementById('lb-btn2').addEventListener('click',function(){showOnly(lbScr);renderLB();});
document.getElementById('lb-back').addEventListener('click',function(){showOnly(startScr);});
document.getElementById('lb-refresh').addEventListener('click',renderLB);
nameInput.addEventListener('keydown',function(e){if(e.key==='Enter')startBtn.click();});

// === 启动 ===
loop();
</script>
</body>
</html>
